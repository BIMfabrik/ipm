<script>
const DATA_URL='./data/ipm.json',DRAFT_KEY='ipm-json-draft-v2',LANG_KEY='ipm-language-v1',DEPTH_KEY='ipm-mobile-depth-v1';

const txt={en:{filter:'Filter graph nodes...',source:'Source: GitHub JSON',draft:'Local draft',copied:'Copied JSON',nodes:'nodes',relations:'relations',kicker:'Tap the graph',hint:'Start with use cases. Then open processes, tools, BIM2FM asset types and data objects layer by layer.',sourceBadge:'Based on editable GitHub JSON tables',tables:'Tables',close:'Close',add:'Add row',download:'Download JSON',copy:'Copy JSON',reset:'Reset draft',noOverlap:'No overlap',fit:'Fit graph'},de:{filter:'Graph-Knoten filtern...',source:'Quelle: GitHub JSON',draft:'Lokaler Entwurf',copied:'JSON kopiert',nodes:'Knoten',relations:'Beziehungen',kicker:'Graph antippen',hint:'Starte mit Anwendungsfällen. Danach Prozesse, Tools, BIM2FM-Anlagearten und Datenobjekte schichtweise öffnen.',sourceBadge:'Basierend auf editierbaren GitHub-JSON-Tabellen',tables:'Tabellen',close:'Schliessen',add:'Zeile hinzufügen',download:'JSON herunterladen',copy:'JSON kopieren',reset:'Entwurf zurücksetzen',noOverlap:'Kein Overlap',fit:'Graph anpassen'}};
let data={meta:{},tables:{}},tables={},lang=localStorage.getItem(LANG_KEY)||'en',depth=localStorage.getItem(DEPTH_KEY)||'overview',activeKey='usecases',sort={column:null,direction:1},selected=null,view={scale:1,tx:0,ty:0};
const $=id=>document.getElementById(id),isMobile=()=>matchMedia('(max-width:900px)').matches,T=k=>(txt[lang]&&txt[lang][k])||txt.en[k]||k,V=v=>v&&typeof v==='object'&&!Array.isArray(v)?(v[lang]??v.en??v.de??Object.values(v)[0]??''):v??'',E=v=>String(v??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;');
function setVal(o,k,text){if(o[k]&&typeof o[k]==='object'&&!Array.isArray(o[k]))o[k][lang]=text;else o[k]=text}function readDraft(){try{return JSON.parse(localStorage.getItem(DRAFT_KEY))}catch{return null}}function saveDraft(){localStorage.setItem(DRAFT_KEY,JSON.stringify(data));$('saveStatus').textContent=T('draft');$('saveStatus').classList.add('warn');renderGraph()}

function applyLanguage(){document.documentElement.lang=lang;$('brandTitle').textContent=V(data.meta?.name)||'Information Process Management';$('brandSubtitle').textContent=`${V(data.meta?.subtitle)||'BIM Lifecycle Intelligence Graph'} — ${V(data.meta?.description)||''}`;$('graphSearch').placeholder=T('filter');$('mobileKicker').textContent=T('kicker');$('mobileHint').textContent=T('hint');$('mobileSourceText').textContent=T('sourceBadge');$('tableToggle').textContent=document.body.classList.contains('tables-open')?T('close'):T('tables');$('addRow').textContent=T('add');$('exportJson').textContent=T('download');$('copyJson').textContent=T('copy');$('resetDraft').textContent=T('reset');$('arrangeGraph').textContent=T('noOverlap');$('fitGraph').textContent=T('fit');$('saveStatus').textContent=localStorage.getItem(DRAFT_KEY)?T('draft'):T('source');$('saveStatus').classList.toggle('warn',!!localStorage.getItem(DRAFT_KEY))}
function renderDepth(){document.querySelectorAll('[data-depth]').forEach(b=>{b.setAttribute('aria-selected',String(b.dataset.depth===depth));b.textContent=lang==='de'?({overview:'Anwendungsfälle',core:'Prozesse + Tools',assets:'BIM2FM-Anlagen',full:'Voller Graph'}[b.dataset.depth]):({overview:'Use cases',core:'Processes + tools',assets:'BIM2FM assets',full:'Full graph'}[b.dataset.depth])})}
function renderTabs(){const tabs=$('tabs');tabs.innerHTML='';Object.entries(tables).forEach(([k,t])=>{const b=document.createElement('button');b.className='tab';b.type='button';b.textContent=`${V(t.label)} (${t.rows?.length||0})`;b.setAttribute('aria-selected',String(k===activeKey));b.onclick=()=>{if(isMobile()&&document.body.classList.contains('tables-open')&&k===activeKey){document.body.classList.remove('tables-open');applyLanguage();return}activeKey=k;sort={column:null,direction:1};renderTabs();renderTable();if(isMobile())document.body.classList.add('tables-open');applyLanguage()};tabs.appendChild(b)})}
function renderTable(){const t=tables[activeKey];if(!t)return;$('activeTitle').textContent=V(t.label);$('activeDescription').textContent=V(t.description);const labels=t.columnLabels||{};$('tableWrap').innerHTML=`<table><thead><tr>${t.columns.map(c=>`<th data-c="${E(c)}">${E(V(labels[c])||c)}${sort.column===c?(sort.direction===1?' ↑':' ↓'):''}</th>`).join('')}<th>Actions</th></tr></thead><tbody>${(t.rows||[]).map((r,i)=>`<tr>${t.columns.map(c=>`<td contenteditable="true" data-r="${i}" data-c="${E(c)}">${E(V(r[c]))}</td>`).join('')}<td><button class="small-btn" data-del="${i}">Delete</button></td></tr>`).join('')}</tbody></table>`;document.querySelectorAll('th[data-c]').forEach(th=>th.onclick=()=>sortTable(th.dataset.c));document.querySelectorAll('td[contenteditable]').forEach(td=>td.oninput=()=>{setVal(t.rows[+td.dataset.r],td.dataset.c,td.textContent.trim());saveDraft()});document.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>{t.rows.splice(+b.dataset.del,1);saveDraft();renderTabs();renderTable()})}
function sortTable(c){const t=tables[activeKey];sort=sort.column===c?{column:c,direction:-sort.direction}:{column:c,direction:1};t.rows.sort((a,b)=>String(V(a[c])).localeCompare(String(V(b[c])),undefined,{numeric:true})*sort.direction);saveDraft();renderTable()}function addRow(){const t=tables[activeKey],r=Object.fromEntries(t.columns.map(c=>[c,'']));r.id=`${activeKey.slice(0,2).toUpperCase()}-${String((t.rows?.length||0)+1).padStart(3,'0')}`;t.rows.push(r);saveDraft();renderTabs();renderTable()}
function graphData(){const nodes=new Map(),edges=[],rows=new Map();const add=(label,type,row)=>{label=V(label);if(!label)return null;const id=`${type}:${label}`;if(!nodes.has(id))nodes.set(id,{id,label,type,links:0,color:colors[type]||'#8e8e93'});if(row&&!rows.has(id))rows.set(id,row);return id};const link=(a,b,p)=>{if(!a||!b||a===b)return;edges.push({source:a,target:b,p});nodes.get(a).links++;nodes.get(b).links++};(tables.usecases?.rows||[]).forEach(r=>{const uc=add(r.name,'usecase',r),pc=add(r.process,'process'),pr=add(r.product,'product'),inp=add(r.input,'input'),out=add(r.output,'output');link(uc,pc,'process');link(uc,pr,'tool');link(inp,uc,'input');link(uc,out,'output')});(tables.assetTypes?.rows||[]).forEach(r=>{const at=add(r.name,'assetType',r),uc=add(r.relatedUsecase,'usecase'),dn=add(r.dataNeed,'input');link(at,uc,'supports');link(at,dn,'requires')});(tables.processes?.rows||[]).forEach(r=>{const pc=add(r.name,'process',r),own=add(r.owner,'actor'),ev=add(r.evidence,'evidence');link(pc,own,'owner');link(pc,ev,'evidence')});(tables.products?.rows||[]).forEach(r=>rows.set(`product:${V(r.name)}`,r));(tables.inputsOutputs?.rows||[]).forEach(r=>rows.set(`${String(V(r.kind)).toLowerCase()==='output'?'output':'input'}:${V(r.name)}`,r));(tables.actors?.rows||[]).forEach(r=>rows.set(`actor:${V(r.name)}`,r));let ns=[...nodes.values()],es=edges;if(isMobile()){const ok=depth==='overview'?new Set(['usecase']):depth==='core'?new Set(['usecase','process','product']):depth==='assets'?new Set(['usecase','assetType']):null;if(ok){ns=ns.filter(n=>ok.has(n.type));const ids=new Set(ns.map(n=>n.id));es=es.filter(e=>ids.has(e.source)&&ids.has(e.target))}}const q=$('graphSearch').value.trim().toLowerCase();if(q){const keep=new Set(ns.filter(n=>n.label.toLowerCase().includes(q)||n.type.includes(q)).map(n=>n.id));es=es.filter(e=>keep.has(e.source)||keep.has(e.target));es.forEach(e=>{keep.add(e.source);keep.add(e.target)});ns=ns.filter(n=>keep.has(n.id))}return{nodes:ns,edges:es,rows}}
function layout(ns,w,h){const by=Object.groupBy?Object.groupBy(ns,n=>n.type):groupBy(ns,n=>n.type),order=['usecase','process','product','assetType','input','output','actor','evidence'],cx=w/2,cy=h/2+(isMobile()?18:0);if($('layoutMode').value==='type'&&!isMobile()){const lanes=order.filter(t=>by[t]?.length);lanes.forEach((type,i)=>by[type].forEach((n,j,a)=>{n.x=(i+1)/(lanes.length+1)*w;n.y=(j+1)/(a.length+1)*h}))}else{order.forEach((type,ri)=>{const a=by[type]||[],rad=Math.min(w,h)*(isMobile()&&type==='usecase'?.34:{usecase:.15,process:.31,product:.48,assetType:.58,input:.68,output:.68,actor:.8,evidence:.82}[type]||.6);a.forEach((n,i)=>{const ang=i/Math.max(a.length,1)*Math.PI*2-Math.PI/2+ri*.18;n.x=cx+Math.cos(ang)*rad;n.y=cy+Math.sin(ang)*rad})})}avoid(ns,w,h)}function avoid(ns,w,h){for(let k=0;k<80;k++){let m=false;for(let i=0;i<ns.length;i++)for(let j=i+1;j<ns.length;j++){const a=ns[i],b=ns[j],min=48,dx=b.x-a.x,dy=b.y-a.y,d=Math.hypot(dx,dy)||.01;if(d<min){const p=(min-d)/2,bx=dx/d,by=dy/d;a.x-=bx*p;a.y-=by*p;b.x+=bx*p;b.y+=by*p;m=true}}ns.forEach(n=>{n.x=Math.min(w-40,Math.max(40,n.x));n.y=Math.min(h-(isMobile()?120:50),Math.max(isMobile()?126:40,n.y))});if(!m)break}}
function renderGraph(){const svg=$('graph'),r=svg.getBoundingClientRect(),w=Math.max(r.width||900,320),h=Math.max(r.height||420,260),g=graphData();layout(g.nodes,w,h);const idx=new Map(g.nodes.map(n=>[n.id,n])),rel=new Set([selected]),activeEdges=new Set;g.edges.forEach((e,i)=>{if(e.source===selected||e.target===selected){rel.add(e.source);rel.add(e.target);activeEdges.add(i)}});svg.setAttribute('viewBox',`0 0 ${w} ${h}`);svg.innerHTML=`<g transform="translate(${view.tx},${view.ty}) scale(${view.scale})">${g.edges.map((e,i)=>{const a=idx.get(e.source),b=idx.get(e.target);if(!a||!b)return'';const cls=selected?(activeEdges.has(i)?'active':'dimmed'):'';return`<line class="edge ${cls}" x1="${a.x}" y1="${a.y}" x2="${b.x}" y2="${b.y}"/>`}).join('')}${g.nodes.map(n=>{const cls=selected?(n.id===selected?'active':rel.has(n.id)?'':'dimmed'):'';return`<g class="node ${cls}" data-id="${E(n.id)}" transform="translate(${n.x},${n.y})"><circle r="${14+Math.min(n.links,6)*2.3}" fill="${n.color}"/><text y="32" text-anchor="middle">${E(short(n.label,isMobile()?20:24))}</text><text class="type" y="47" text-anchor="middle">${E(n.type)}</text></g>`}).join('')}</g>`;$('graphMeta').textContent=`${g.nodes.length} ${T('nodes')} · ${g.edges.length} ${T('relations')}`;wireGraph(svg,g.rows)}
function wireGraph(svg,rows){svg.querySelectorAll('.node').forEach(n=>n.onpointerdown=e=>{e.stopPropagation();selected=n.dataset.id;renderCard(selected,rows);renderGraph()});svg.onpointerdown=e=>{if(!e.target.closest('.node')){selected=null;renderCard(null);renderGraph()}}}function renderCard(id,rows){const card=$('nodeCard');if(!id){card.classList.remove('visible');return}const row=rows.get(id)||{};card.classList.add('visible');card.innerHTML=`<header><div><h2>${E(id.split(':').slice(1).join(':'))}</h2><p>${E(id.split(':')[0])}</p></div><button onclick="selected=null;renderCard(null);renderGraph()">×</button></header><dl>${Object.entries(row).slice(0,8).map(([k,v])=>`<dt>${E(k)}</dt><dd>${E(V(v))}</dd>`).join('')}</dl>`}
function groupBy(a,fn){return a.reduce((m,x)=>((m[fn(x)]??=[]).push(x),m),{})}function short(s,n){s=String(s||'');return s.length>n?s.slice(0,n-1)+'…':s}function download(){const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'}),url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download='ipm.json';a.click();URL.revokeObjectURL(url)}
$('addRow').onclick=addRow;$('exportJson').onclick=download;$('copyJson').onclick=async()=>{await navigator.clipboard.writeText(JSON.stringify(data,null,2));$('saveStatus').textContent=T('copied')};$('resetDraft').onclick=()=>{localStorage.removeItem(DRAFT_KEY);location.reload()};$('arrangeGraph').onclick=()=>{selected=null;renderGraph()};$('fitGraph').onclick=()=>{view={scale:1,tx:0,ty:0};renderGraph()};$('tableToggle').onclick=()=>{document.body.classList.toggle('tables-open');applyLanguage()};$('dataPanel').onclick=e=>{if(isMobile()&&document.body.classList.contains('tables-open')&&(e.target.id==='dataPanel'||e.target.id==='tabs')){document.body.classList.remove('tables-open');applyLanguage()}};document.querySelectorAll('[data-depth]').forEach(b=>b.onclick=()=>{depth=b.dataset.depth;localStorage.setItem(DEPTH_KEY,depth);selected=null;renderDepth();renderGraph()});$('languageMode').value=lang;$('languageMode').onchange=e=>{lang=e.target.value;localStorage.setItem(LANG_KEY,lang);applyLanguage();renderDepth();renderTabs();renderTable();renderGraph()};$('layoutMode').onchange=renderGraph;$('graphSearch').oninput=()=>{selected=null;renderGraph()};window.onresize=()=>requestAnimationFrame(renderGraph);loadData();
</script>
