function initGraph(){if(!window.ForceGraph3D||!window.THREE){$('loading').textContent='3D library failed to load. Check network/CDN access.';return}const el=$('graph3d');graph=ForceGraph3D({controlType:'orbit'})(el).backgroundColor('rgba(0,0,0,0)').nodeId('id').nodeLabel(n=>`${n.label} · ${n.type}`).nodeThreeObject(makeNodeObject).linkLabel(l=>l.label).linkColor(l=>l.color).linkWidth(l=>l.width||3.2).linkOpacity(.96).linkDirectionalParticles(l=>l.particles||0).linkDirectionalParticleWidth(l=>l.particleWidth||3).linkDirectionalParticleColor(l=>l.color).linkDirectionalParticleSpeed(l=>l.particleSpeed||.011).linkDirectionalArrowLength(7).linkDirectionalArrowRelPos(1).linkDirectionalArrowColor(l=>l.color).onNodeClick(node=>{selected=node.id;renderCard(node.id,lastGraph.rows);renderGraph();focusNode(node)}).onBackgroundClick(()=>{selected=null;renderCard(null);renderGraph()}).enableNodeDrag(false);graph.d3Force('charge').strength(isMobile()?-95:-135);graph.d3Force('link').distance(l=>isMobile()?84:108);graph.d3VelocityDecay(.32);window.addEventListener('resize',()=>{graph.width(el.clientWidth);graph.height(el.clientHeight)});$('loading').style.display='none'}
function makeNodeObject(node){const g=new THREE.Group(),s=new THREE.Mesh(new THREE.SphereGeometry(node.val||5,24,24),new THREE.MeshLambertMaterial({color:node.color,emissive:node.color,emissiveIntensity:.18}));g.add(s);const label=makeLabelSprite(node.label,node.type);label.position.set(0,(node.val||5)+8,0);g.add(label);return g}function makeLabelSprite(label,type){const c=document.createElement('canvas'),ctx=c.getContext('2d'),text=short(label,isMobile()?18:24),fs=isMobile()?34:38,px=18,py=10;c.width=512;c.height=128;ctx.font=`700 ${fs}px Inter, system-ui, sans-serif`;const tw=Math.min(ctx.measureText(text).width,460),w=tw+px*2,h=fs+py*2,x=(c.width-w)/2,y=(c.height-h)/2;ctx.fillStyle='rgba(3,7,18,.78)';roundRect(ctx,x,y,w,h,18);ctx.fill();ctx.strokeStyle='rgba(255,255,255,.22)';ctx.stroke();ctx.fillStyle='#fff';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(text,c.width/2,c.height/2-2);ctx.font=`500 ${Math.round(fs*.46)}px Inter, system-ui, sans-serif`;ctx.fillStyle='rgba(255,255,255,.72)';ctx.fillText(type,c.width/2,c.height/2+fs*.52);const tex=new THREE.CanvasTexture(c);tex.minFilter=THREE.LinearFilter;const mat=new THREE.SpriteMaterial({map:tex,transparent:true,depthWrite:false});const sp=new THREE.Sprite(mat);sp.scale.set(isMobile()?42:54,isMobile()?10.5:13.5,1);return sp}function roundRect(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath()}
function renderGraph(){if(!graph)return;lastGraph=graphData();$('graphMeta').textContent=`${lastGraph.nodes.length} ${T('nodes')} · ${lastGraph.links.length} ${T('relations')} · 3D`;$('hud').innerHTML=Object.entries(relationColors).filter(([p])=>lastGraph.links.some(l=>l.label===p)).map(([p,color])=>`<span class="chip"><span style="display:inline-block;width:24px;height:4px;border-radius:99px;background:${color};margin-right:6px;vertical-align:middle;box-shadow:0 0 12px ${color}"></span>${p}</span>`).join('');graph.graphData({nodes:lastGraph.nodes,links:lastGraph.links});setTimeout(()=>fitGraph(),320)}function focusNode(node){const d=isMobile()?145:210,r=1+d/Math.hypot(node.x||1,node.y||1,node.z||1);graph.cameraPosition({x:(node.x||0)*r,y:(node.y||0)*r,z:(node.z||0)*r},node,700)}function fitGraph(){if(graph)graph.zoomToFit(700,80)}function renderCard(id,rows){const card=$('nodeCard');if(!id){card.classList.remove('visible');return}const row=rows.get(id)||{};card.classList.add('visible');card.innerHTML=`<header><div><h2>${E(id.split(':').slice(1).join(':'))}</h2><p>${E(id.split(':')[0])}</p></div><button onclick="selected=null;renderCard(null,lastGraph.rows);renderGraph()">×</button></header><dl>${Object.entries(row).slice(0,9).map(([k,v])=>`<dt>${E(k)}</dt><dd>${E(V(v))}</dd>`).join('')}</dl>`}function short(s,n){s=String(s||'');return s.length>n?s.slice(0,n-1)+'…':s}function download(){const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'}),url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download='ipm.json';a.click();URL.revokeObjectURL(url)}
$('addRow').onclick=addRow;$('exportJson').onclick=download;$('copyJson').onclick=async()=>{await navigator.clipboard.writeText(JSON.stringify(data,null,2));$('saveStatus').textContent=T('copied')};$('resetDraft').onclick=()=>{localStorage.removeItem(DRAFT_KEY);location.reload()};$('fitGraph').onclick=fitGraph;$('tableToggle').onclick=()=>{document.body.classList.toggle('tables-open');applyLanguage()};$('dataPanel').onclick=e=>{if(isMobile()&&document.body.classList.contains('tables-open')&&(e.target.id==='dataPanel'||e.target.id==='tabs')){document.body.classList.remove('tables-open');applyLanguage()}};document.querySelectorAll('[data-depth]').forEach(b=>b.onclick=()=>{depth=b.dataset.depth;localStorage.setItem(DEPTH_KEY,depth);selected=null;renderDepth();renderCard(null);renderGraph()});$('languageMode').value=lang;$('languageMode').onchange=e=>{lang=e.target.value;localStorage.setItem(LANG_KEY,lang);applyLanguage();renderDepth();renderTabs();renderTable();renderGraph()};$('graphMode').onchange=()=>{if(graph){graph.numDimensions(3);renderGraph()}};$('graphSearch').oninput=()=>{selected=null;renderCard(null);renderGraph()};loadData();
</script>
