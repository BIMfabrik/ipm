<body>
  <main class="app">
    <section class="graph-panel" aria-label="BIM lifecycle relations graph">
      <header class="topbar">
        <div class="brand"><strong id="brandTitle">Information Process Management</strong><span id="brandSubtitle">BIM Lifecycle Intelligence Graph</span></div>
        <div class="toolbar">
          <input id="graphSearch" class="search" type="search" placeholder="Filter graph nodes..." />
          <select id="languageMode" aria-label="Language"><option value="en">EN</option><option value="de">DE</option></select>
          <select id="layoutMode" aria-label="Graph layout mode"><option value="topic">Story clusters</option><option value="type">Data lanes</option><option value="radial">Impact radar</option><option value="manual">Manual</option></select>
          <button id="arrangeGraph" type="button">No overlap</button><button id="fitGraph" type="button">Fit graph</button><button id="resetDraft" type="button">Reset draft</button>
          <span id="sourceStatus" class="pill">Loading JSON...</span><span id="graphMeta" class="meta"></span>
        </div>
      </header>
      <div class="graph-wrap">
        <div class="mobile-hero"><strong id="mobileKicker">Tap the graph</strong><span id="mobileHint">Start with use cases. Then open processes, tools, data objects and actors layer by layer.</span></div>
        <svg id="graph" role="img" aria-label="Interactive BIM lifecycle relations graph"></svg>
        <aside id="nodeCard" class="node-card" aria-live="polite"></aside>
        <div class="mobile-depth" aria-label="Mobile graph depth"><button type="button" data-depth="overview">Use cases</button><button type="button" data-depth="core">Processes + tools</button><button type="button" data-depth="full">Full graph</button></div>
        <div class="mobile-source-badge"><span id="mobileSourceText">Based on editable GitHub JSON tables</span><button id="tableToggle" type="button">Tables</button></div>
        <div class="legend" aria-hidden="true"><span class="chip"><span class="dot" style="background:#0a84ff"></span>Use cases</span><span class="chip"><span class="dot" style="background:#30d158"></span>Products</span><span class="chip"><span class="dot" style="background:#ff9f0a"></span>Inputs / Outputs</span><span class="chip"><span class="dot" style="background:#bf5af2"></span>Processes</span></div>
      </div>
    </section>
    <section class="data-panel" aria-label="Source tables"><nav id="tabs" class="tabs" aria-label="Source table tabs"></nav><div class="tablebar"><div class="table-title"><strong id="activeTitle"></strong><span id="activeDescription"></span></div><div class="toolbar"><button id="addRow" type="button">Add row</button><button id="exportJson" type="button">Download JSON</button><button id="copyJson" type="button">Copy JSON</button><span id="saveStatus" class="status">Source: GitHub JSON</span></div></div><div id="tableWrap" class="table-wrap"></div></section>
  </main>
<script>
const DATA_URL='./data/ipm.json',DRAFT_KEY='ipm-json-draft-v2',POS_KEY='ipm-graph-positions-v2',LAYOUT_KEY='ipm-graph-layout-v2',LANG_KEY='ipm-language-v1',DEPTH_KEY='ipm-mobile-depth-v1';

const i18n={en:{filter:'Filter graph nodes...',noOverlap:'No overlap',fit:'Fit graph',reset:'Reset draft',add:'Add row',download:'Download JSON',copy:'Copy JSON',source:'Source: GitHub JSON',draft:'Local draft',loading:'Loading JSON...',jsonOk:'GitHub JSON',jsonFail:'Demo fallback',relations:'relations',nodes:'nodes',kicker:'Tap the graph',hint:'Start with use cases. Then open processes, tools, data objects and actors layer by layer.',sourceBadge:'Based on editable GitHub JSON tables',tables:'Tables',closeTables:'Close'},de:{filter:'Graph-Knoten filtern...',noOverlap:'Kein Overlap',fit:'Graph anpassen',reset:'Entwurf zurücksetzen',add:'Zeile hinzufügen',download:'JSON herunterladen',copy:'JSON kopieren',source:'Quelle: GitHub JSON',draft:'Lokaler Entwurf',loading:'JSON laden...',jsonOk:'GitHub JSON',jsonFail:'Demo-Fallback',relations:'Beziehungen',nodes:'Knoten',kicker:'Graph antippen',hint:'Starte mit Anwendungsfällen. Danach Prozesse, Tools, Datenobjekte und Akteure schichtweise öffnen.',sourceBadge:'Basierend auf editierbaren GitHub-JSON-Tabellen',tables:'Tabellen',closeTables:'Schliessen'}};
let sourceData={meta:{name:{en:'Information Process Management',de:'Informationsprozess-Management'},subtitle:{en:'BIM Lifecycle Intelligence Graph',de:'BIM-Lebenszyklus-Intelligenzgraph'},version:'fallback'},tables:{}},data=sourceData,tables={},activeKey='usecases',sortState={column:null,direction:1},positions=loadJson(POS_KEY,{}),layoutMode=localStorage.getItem(LAYOUT_KEY)||'topic',lang=localStorage.getItem(LANG_KEY)||'en',mobileDepth=localStorage.getItem(DEPTH_KEY)||'overview';
let graphState={scale:1,tx:0,ty:0,selectedId:null,draggingNode:null,panning:false,pointerStart:null,moved:false};
const $=id=>document.getElementById(id),tabsEl=$('tabs'),tableWrap=$('tableWrap'),activeTitle=$('activeTitle'),activeDescription=$('activeDescription'),saveStatus=$('saveStatus'),sourceStatus=$('sourceStatus'),graphSearch=$('graphSearch'),graphMeta=$('graphMeta'),nodeCard=$('nodeCard'),layoutModeSelect=$('layoutMode'),languageMode=$('languageMode');
const isMobile=()=>matchMedia('(max-width:900px)').matches;layoutModeSelect.value=layoutMode;languageMode.value=lang;
function t(k){return i18n[lang][k]||i18n.en[k]||k}function val(x){return x&&typeof x==='object'&&!Array.isArray(x)?(x[lang]??x.en??x.de??Object.values(x)[0]??''):x??''}function setVal(o,k,text){if(o[k]&&typeof o[k]==='object'&&!Array.isArray(o[k]))o[k][lang]=text;else o[k]=text}function loadJson(k,f){try{return JSON.parse(localStorage.getItem(k))??f}catch{return f}}function saveDraft(){localStorage.setItem(DRAFT_KEY,JSON.stringify(data));saveStatus.textContent=t('draft');saveStatus.classList.add('warn');renderGraph()}function savePositions(){localStorage.setItem(POS_KEY,JSON.stringify(positions))}
async function loadData(){try{const res=await fetch(DATA_URL,{cache:'no-store'});if(!res.ok)throw new Error(res.status);sourceData=await res.json();sourceStatus.textContent=t('jsonOk');sourceStatus.className='pill good'}catch(e){sourceStatus.textContent=t('jsonFail');sourceStatus.className='pill warn'}const draft=loadJson(DRAFT_KEY,null);data=draft||structuredClone(sourceData);tables=data.tables||{};applyLanguage();renderTabs();renderTable();renderDepthButtons();renderGraph();if(isMobile()){layoutMode='radial';layoutModeSelect.value='radial';fitGraph()}}
function applyLanguage(){document.documentElement.lang=lang;$('brandTitle').textContent=val(data.meta?.name)||'Information Process Management';$('brandSubtitle').textContent=(val(data.meta?.subtitle)||'BIM Lifecycle Intelligence Graph')+' — '+(val(data.meta?.description)||'');graphSearch.placeholder=t('filter');$('arrangeGraph').textContent=t('noOverlap');$('fitGraph').textContent=t('fit');$('resetDraft').textContent=t('reset');$('addRow').textContent=t('add');$('exportJson').textContent=t('download');$('copyJson').textContent=t('copy');$('mobileKicker').textContent=t('kicker');$('mobileHint').textContent=t('hint');$('mobileSourceText').textContent=t('sourceBadge');$('tableToggle').textContent=document.body.classList.contains('tables-open')?t('closeTables'):t('tables');saveStatus.textContent=localStorage.getItem(DRAFT_KEY)?t('draft'):t('source');saveStatus.classList.toggle('warn',!!localStorage.getItem(DRAFT_KEY));sourceStatus.textContent=sourceStatus.classList.contains('good')?t('jsonOk'):sourceStatus.classList.contains('warn')?t('jsonFail'):t('loading')}
function renderDepthButtons(){document.querySelectorAll('[data-depth]').forEach(b=>{b.setAttribute('aria-selected',String(b.dataset.depth===mobileDepth));b.textContent=lang==='de'?({overview:'Anwendungsfälle',core:'Prozesse + Tools',full:'Voller Graph'}[b.dataset.depth]):({overview:'Use cases',core:'Processes + tools',full:'Full graph'}[b.dataset.depth])})}
function renderTabs(){tabsEl.innerHTML='';Object.entries(tables).forEach(([key,table])=>{const b=document.createElement('button');b.className='tab';b.type='button';b.textContent=`${val(table.label)} (${table.rows?.length||0})`;b.setAttribute('aria-selected',String(key===activeKey));b.onclick=()=>{activeKey=key;sortState={column:null,direction:1};renderTabs();renderTable();if(isMobile())document.body.classList.add('tables-open');applyLanguage()};tabsEl.appendChild(b)})}
function renderTable(){const table=tables[activeKey];if(!table)return;activeTitle.textContent=val(table.label);activeDescription.textContent=val(table.description);const labels=table.columnLabels||{};tableWrap.innerHTML=`<table><thead><tr>${table.columns.map(c=>`<th data-column="${esc(c)}">${esc(val(labels[c])||c)}${sortState.column===c?(sortState.direction===1?' ↑':' ↓'):''}</th>`).join('')}<th class="row-actions">Actions</th></tr></thead><tbody>${table.rows.map((r,i)=>`<tr>${table.columns.map(c=>`<td contenteditable="true" data-row="${i}" data-column="${esc(c)}">${esc(val(r[c]))}</td>`).join('')}<td class="row-actions"><button class="small-btn" type="button" data-delete="${i}">Delete</button></td></tr>`).join('')}</tbody></table>`;tableWrap.querySelectorAll('th[data-column]').forEach(th=>th.onclick=()=>sortTable(th.dataset.column));tableWrap.querySelectorAll('td[contenteditable=true]').forEach(cell=>cell.oninput=()=>{setVal(tables[activeKey].rows[+cell.dataset.row],cell.dataset.column,cell.textContent.trim());saveDraft()});tableWrap.querySelectorAll('[data-delete]').forEach(b=>b.onclick=()=>{tables[activeKey].rows.splice(+b.dataset.delete,1);saveDraft();renderTable();renderTabs()})}
function sortTable(column){sortState=sortState.column===column?{column,direction:sortState.direction*-1}:{column,direction:1};tables[activeKey].rows.sort((a,b)=>String(val(a[column])).localeCompare(String(val(b[column])),undefined,{numeric:true})*sortState.direction);saveDraft();renderTable()}function addRow(){const table=tables[activeKey],row=Object.fromEntries(table.columns.map(c=>[c,'']));row.id=`${activeKey.slice(0,2).toUpperCase()}-${String((table.rows?.length||0)+1).padStart(3,'0')}`;table.rows.push(row);saveDraft();renderTable();renderTabs()}function exportJson(){downloadJson(JSON.stringify(data,null,2),'ipm.json')}async function copyJson(){await navigator.clipboard.writeText(JSON.stringify(data,null,2));saveStatus.textContent='Copied JSON'}function downloadJson(text,name){const blob=new Blob([text],{type:'application/json'}),url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download=name;a.click();URL.revokeObjectURL(url)}function resetDraft(){localStorage.removeItem(DRAFT_KEY);data=structuredClone(sourceData);tables=data.tables||{};positions={};localStorage.removeItem(POS_KEY);applyLanguage();renderTabs();renderTable();renderGraph()}
function buildGraph(){const nodes=new Map(),edges=[],rows=new Map();function addNode(label,type,row=null,topic=null){label=val(label);if(!label)return null;const id=`${type}:${label}`;if(!nodes.has(id))nodes.set(id,{id,label,type,color:colors[type]||'#8e8e93',links:0,topics:new Set});if(topic)nodes.get(id).topics.add(val(topic));if(row&&!rows.has(id))rows.set(id,row);return id}function addEdge(source,target,predicate,topic=null){if(!source||!target||source===target)return;edges.push({id:`${source}|${predicate}|${target}`,source,target,predicate,topic:val(topic)});nodes.get(source).links++;nodes.get(target).links++}(tables.usecases?.rows||[]).forEach(row=>{const topic=row.name,uc=addNode(row.name,'usecase',row,topic),pr=addNode(row.product,'product',null,topic),inp=addNode(row.input,'input',null,topic),out=addNode(row.output,'output',null,topic),pc=addNode(row.process,'process',null,topic);addEdge(uc,pc,'belongsToProcess',topic);addEdge(uc,pr,'usesProduct',topic);addEdge(inp,uc,'feedsUseCase',topic);addEdge(uc,out,'produces',topic)});(tables.processes?.rows||[]).forEach(row=>{const pc=addNode(row.name,'process',row),owner=addNode(row.owner,'actor'),ev=addNode(row.evidence,'evidence');addEdge(pc,owner,'ownedBy');addEdge(pc,ev,'documentedBy')});(tables.products?.rows||[]).forEach(r=>rows.set(`product:${val(r.name)}`,r));(tables.inputsOutputs?.rows||[]).forEach(r=>rows.set(`${String(val(r.kind)).toLowerCase()==='output'?'output':'input'}:${val(r.name)}`,r));(tables.actors?.rows||[]).forEach(r=>rows.set(`actor:${val(r.name)}`,r));nodes.forEach(n=>{n.topics=[...n.topics];n.primaryTopic=n.topics[0]||'Shared lifecycle resources'});return{nodes:[...nodes.values()],edges,rows}}
function visibleGraph(){const g=buildGraph(),q=graphSearch.value.trim().toLowerCase();let nodes=g.nodes,edges=g.edges;if(isMobile()){const allowed=mobileDepth==='overview'?new Set(['usecase']):mobileDepth==='core'?new Set(['usecase','process','product']):null;if(allowed){nodes=nodes.filter(n=>allowed.has(n.type));const ids=new Set(nodes.map(n=>n.id));edges=edges.filter(e=>ids.has(e.source)&&ids.has(e.target))}}if(q){const keep=new Set(nodes.filter(n=>n.label.toLowerCase().includes(q)||n.type.includes(q)||n.primaryTopic.toLowerCase().includes(q)).map(n=>n.id));edges=edges.filter(e=>keep.has(e.source)||keep.has(e.target));edges.forEach(e=>{keep.add(e.source);keep.add(e.target)});nodes=nodes.filter(n=>keep.has(n.id))}return{nodes,edges,rows:g.rows}}
function layoutNodes(nodes,w,h){nodes.forEach(n=>n.r=12+Math.min(n.links,6)*2.4);if(layoutMode==='manual')layoutManual(nodes,w,h);else if(layoutMode==='type')layoutByType(nodes,w,h);else if(layoutMode==='radial'||isMobile())layoutRadial(nodes,w,h);else layoutByTopic(nodes,w,h);preventOverlap(nodes,w,h,isMobile()?54:46,isMobile()?120:90);if(layoutMode!=='manual')nodes.forEach(n=>positions[n.id]={x:n.x,y:n.y});savePositions();return clusterBounds(nodes)}function layoutManual(nodes,w,h){const c={x:w/2,y:h/2},r=Math.min(w,h)*.36;nodes.forEach((n,i)=>{const p=positions[n.id];if(p){n.x=p.x;n.y=p.y}else{const a=i/Math.max(nodes.length,1)*Math.PI*2;n.x=c.x+Math.cos(a)*r;n.y=c.y+Math.sin(a)*r}})}function layoutRadial(nodes,w,h){const c={x:w/2,y:h/2+(isMobile()?18:0)},rings={usecase:isMobile()?.34:.15,process:.31,product:.48,input:.64,output:.64,actor:.8,evidence:.82},by=groupBy(nodes,n=>n.type);Object.entries(by).forEach(([type,group])=>{const r=Math.min(w,h)*(rings[type]||.7);group.forEach((n,i)=>{const a=i/Math.max(group.length,1)*Math.PI*2-Math.PI/2+typeWeight(type)*.18;n.x=c.x+Math.cos(a)*r;n.y=c.y+Math.sin(a)*r})})}function layoutByType(nodes,w,h){const order=['usecase','process','product','input','output','actor','evidence'],by=groupBy(nodes,n=>n.type),lanes=order.filter(t=>by[t]?.length).concat(Object.keys(by).filter(t=>!order.includes(t)));lanes.forEach((type,li)=>{const group=by[type],x=(li+1)/(lanes.length+1)*w;group.forEach((n,i)=>{n.x=x+(i%2?26:-26);n.y=(i+1)/(group.length+1)*h;n.cluster=prettyType(type)})})}function layoutByTopic(nodes,w,h){const topics=(tables.usecases?.rows||[]).map(r=>val(r.name)).filter(Boolean),cols=Math.ceil(Math.sqrt(Math.max(topics.length,1))),rows=Math.ceil(Math.max(topics.length,1)/cols),cellW=w/cols,cellH=h/rows,centers=new Map;topics.forEach((t,i)=>centers.set(t,{x:(i%cols)*cellW+cellW/2,y:Math.floor(i/cols)*cellH+cellH/2}));const by=groupBy(nodes,n=>n.primaryTopic||topics[0]||'IPM');Object.entries(by).forEach(([topic,group])=>{const c=centers.get(topic)||{x:w/2,y:h/2};group.sort((a,b)=>typeWeight(a.type)-typeWeight(b.type));group.forEach((n,i)=>{if(n.type==='usecase'){n.x=c.x;n.y=c.y}else{const a=i/Math.max(group.length-1,1)*Math.PI*2+typeWeight(n.type)*.46,r=Math.min(cellW,cellH)*(.18+Math.min(i,6)*.032);n.x=c.x+Math.cos(a)*r;n.y=c.y+Math.sin(a)*r}n.cluster=topic})})}function preventOverlap(nodes,w,h,pad=42,it=60){for(let step=0;step<it;step++){let moved=false;for(let i=0;i<nodes.length;i++)for(let j=i+1;j<nodes.length;j++){const a=nodes[i],b=nodes[j],min=a.r+b.r+pad;let dx=b.x-a.x,dy=b.y-a.y,dist=Math.hypot(dx,dy)||.01;if(dist<min){const push=(min-dist)/2;dx/=dist;dy/=dist;a.x-=dx*push;a.y-=dy*push;b.x+=dx*push;b.y+=dy*push;moved=true}}nodes.forEach(n=>{n.x=Math.min(w-n.r-28,Math.max(n.r+28,n.x));n.y=Math.min(h-n.r-(isMobile()?116:52),Math.max(n.r+(isMobile()?126:46),n.y))});if(!moved)break}}function clusterBounds(nodes){if(layoutMode==='manual'||layoutMode==='radial'||isMobile())return[];const by=groupBy(nodes.filter(n=>n.cluster),n=>n.cluster);return Object.entries(by).map(([label,g])=>{const pad=48,minX=Math.min(...g.map(n=>n.x-n.r))-pad,maxX=Math.max(...g.map(n=>n.x+n.r))+pad,minY=Math.min(...g.map(n=>n.y-n.r))-pad,maxY=Math.max(...g.map(n=>n.y+n.r))+pad;return{label,x:minX,y:minY,w:maxX-minX,h:maxY-minY}})}
function renderGraph(){const svg=$('graph'),rect=svg.getBoundingClientRect(),w=Math.max(rect.width||900,320),h=Math.max(rect.height||420,260),{nodes,edges}=visibleGraph(),clusters=layoutNodes(nodes,w,h),idx=new Map(nodes.map(n=>[n.id,n])),sel=graphState.selectedId,selEdges=new Set(edges.filter(e=>e.source===sel||e.target===sel).map(e=>e.id)),related=new Set([sel]);edges.forEach(e=>{if(e.source===sel||e.target===sel){related.add(e.source);related.add(e.target)}});const has=Boolean(sel&&idx.has(sel)),cm=clusters.map(c=>`<g><rect class="cluster-bg" x="${c.x}" y="${c.y}" width="${c.w}" height="${c.h}" rx="28"></rect><text class="cluster-label" x="${c.x+18}" y="${c.y+28}">${esc(shortLabel(c.label,38))}</text></g>`).join(''),em=edges.map(e=>{const s=idx.get(e.source),t=idx.get(e.target);if(!s||!t)return'';const state=has?(selEdges.has(e.id)?'active':'dimmed'):'',mx=(s.x+t.x)/2,my=(s.y+t.y)/2;return`<line class="edge ${state}" x1="${s.x}" y1="${s.y}" x2="${t.x}" y2="${t.y}"/><text class="edge-label ${state}" x="${mx}" y="${my}">${esc(e.predicate)}</text>`}).join(''),nm=nodes.map(n=>{const state=has?(n.id===sel?'active':(related.has(n.id)?'':'dimmed')):'';return`<g class="node ${state}" data-node-id="${esc(n.id)}" transform="translate(${n.x},${n.y})"><circle r="${n.r}" fill="${n.color}" opacity=".92"></circle><text y="${n.r+16}" text-anchor="middle">${esc(shortLabel(n.label,isMobile()?20:24))}</text><text class="type" y="${n.r+31}" text-anchor="middle">${esc(n.type)}</text></g>`}).join('');svg.setAttribute('viewBox',`0 0 ${w} ${h}`);svg.innerHTML=`<g id="viewport" transform="translate(${graphState.tx},${graphState.ty}) scale(${graphState.scale})"><g>${cm}</g><g>${em}</g><g>${nm}</g></g>`;graphMeta.textContent=`${nodes.length} ${t('nodes')} · ${edges.length} ${t('relations')} · ${Math.round(graphState.scale*100)}% · ${layoutModeLabel()}`;wireGraphEvents(svg);if(has)renderNodeCard(sel);else renderNodeCard(null)}
function wireGraphEvents(svg){svg.querySelectorAll('.node').forEach(el=>{el.onpointerdown=e=>{e.stopPropagation();graphState.draggingNode=el.dataset.nodeId;graphState.pointerStart=pointerInfo(e,svg);graphState.moved=false;el.setPointerCapture(e.pointerId);el.classList.add('dragging')}});svg.onpointerdown=e=>{if(e.target.closest('.node'))return;graphState.panning=true;graphState.pointerStart=pointerInfo(e,svg);graphState.moved=false;svg.setPointerCapture(e.pointerId)};svg.onpointermove=e=>{if(!graphState.pointerStart)return;const cur=pointerInfo(e,svg),dx=cur.screenX-graphState.pointerStart.screenX,dy=cur.screenY-graphState.pointerStart.screenY;if(Math.abs(dx)+Math.abs(dy)>3)graphState.moved=true;if(graphState.draggingNode){positions[graphState.draggingNode]={x:cur.worldX,y:cur.worldY};layoutMode='manual';layoutModeSelect.value='manual';localStorage.setItem(LAYOUT_KEY,layoutMode);savePositions();renderGraph()}else if(graphState.panning){graphState.tx+=dx;graphState.ty+=dy;graphState.pointerStart=cur;renderGraph()}};svg.onpointerup=e=>{const node=e.target.closest('.node');if(graphState.draggingNode&&!graphState.moved&&node)graphState.selectedId=node.dataset.nodeId;else if(graphState.panning&&!graphState.moved)graphState.selectedId=null;graphState.draggingNode=null;graphState.panning=false;graphState.pointerStart=null;renderGraph()};svg.onwheel=e=>{e.preventDefault();const before=pointerInfo(e,svg),factor=e.deltaY<0?1.12:.89,newScale=Math.min(3.2,Math.max(.35,graphState.scale*factor));graphState.tx=before.screenX-before.worldX*newScale;graphState.ty=before.screenY-before.worldY*newScale;graphState.scale=newScale;renderGraph()}}function pointerInfo(e,svg){const r=svg.getBoundingClientRect(),screenX=e.clientX-r.left,screenY=e.clientY-r.top;return{screenX,screenY,worldX:(screenX-graphState.tx)/graphState.scale,worldY:(screenY-graphState.ty)/graphState.scale}}
function renderNodeCard(id){if(!id){nodeCard.classList.remove('visible');nodeCard.innerHTML='';return}const{nodes,edges,rows}=visibleGraph(),node=nodes.find(n=>n.id===id);if(!node){nodeCard.classList.remove('visible');return}const row=rows.get(id)||{},connected=edges.filter(e=>e.source===id||e.target===id);nodeCard.classList.add('visible');nodeCard.innerHTML=`<header><div><h2>${esc(node.label)}</h2><p>${esc(node.type)} · ${connected.length} ${t('relations')}</p></div><button class="close" type="button" aria-label="Close">×</button></header><dl><dt>ID</dt><dd>${esc(node.id)}</dd>${Object.entries(row).slice(0,8).map(([k,v])=>`<dt>${esc(k)}</dt><dd>${esc(val(v))}</dd>`).join('')}<dt>Relations</dt><dd>${connected.map(e=>esc(e.predicate)).join(', ')||'None'}</dd></dl>`;nodeCard.querySelector('.close').onclick=()=>{graphState.selectedId=null;renderGraph()}}
function autoArrange(){positions={};graphState.selectedId=null;layoutMode=layoutModeSelect.value;localStorage.setItem(LAYOUT_KEY,layoutMode);localStorage.removeItem(POS_KEY);renderGraph()}function fitGraph(){graphState.scale=1;graphState.tx=0;graphState.ty=0;graphState.selectedId=null;renderGraph()}function groupBy(arr,fn){return arr.reduce((m,x)=>((m[fn(x)]??=[]).push(x),m),{})}function typeWeight(t){return{usecase:0,process:1,product:2,input:3,output:4,actor:5,evidence:6}[t]??7}function prettyType(tpe){return({usecase:val(tables.usecases?.label)||'Use cases',process:val(tables.processes?.label)||'Processes',product:val(tables.products?.label)||'Products',input:'Inputs',output:'Outputs',actor:val(tables.actors?.label)||'Actors',evidence:'Evidence'}[tpe]||tpe)}function layoutModeLabel(){return({topic:'Story clusters',type:'Data lanes',radial:'Impact radar',manual:'Manual'}[layoutMode]||layoutMode)}function shortLabel(v,max){const s=String(v??'');return s.length>max?`${s.slice(0,max-1)}…`:s}function esc(v){return String(v??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;')}
$('addRow').onclick=addRow;$('exportJson').onclick=exportJson;$('copyJson').onclick=copyJson;$('resetDraft').onclick=resetDraft;$('fitGraph').onclick=fitGraph;$('arrangeGraph').onclick=autoArrange;$('tableToggle').onclick=()=>{document.body.classList.toggle('tables-open');applyLanguage()};document.querySelectorAll('[data-depth]').forEach(b=>b.onclick=()=>{mobileDepth=b.dataset.depth;localStorage.setItem(DEPTH_KEY,mobileDepth);renderDepthButtons();graphState.selectedId=null;fitGraph()});layoutModeSelect.onchange=autoArrange;languageMode.onchange=()=>{lang=languageMode.value;localStorage.setItem(LANG_KEY,lang);applyLanguage();renderDepthButtons();renderTabs();renderTable();renderGraph()};graphSearch.oninput=()=>{graphState.selectedId=null;renderGraph()};window.onresize=()=>requestAnimationFrame(()=>{if(isMobile()&&layoutMode!=='manual'){layoutMode='radial';layoutModeSelect.value='radial'}renderGraph()});loadData();
