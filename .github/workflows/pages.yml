name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject cache-busted IPM enhancements
        run: |
          python - <<'PY'
          from pathlib import Path

          page = Path('index.html')
          html = page.read_text(encoding='utf-8')
          old_tags = [
              '<script src="./mobile-anchor-fix.js"></script>',
              '<script src="./ipm-enhancements-v2.js"></script>',
              '<script src="./ipm-enhancements-v2.js?v=20260711-2"></script>',
              '<script src="./graph-stability-v1.js"></script>',
          ]
          for old_tag in old_tags:
              html = html.replace(old_tag, '')

          tags = [
              '<script src="./ipm-enhancements-v2.js?v=20260711-2"></script>',
              '<script src="./graph-stability-v1.js?v=20260711-1"></script>',
          ]
          html = html.replace('</body>', '\n'.join(tags) + '\n</body>')
          page.write_text(html, encoding='utf-8')
          PY

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
