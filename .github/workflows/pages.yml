name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject IPM enhancements and deployment version
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          page = Path('index.html')
          html = page.read_text(encoding='utf-8')
          commit_sha = os.environ.get('GITHUB_SHA', 'unknown')
          short_sha = commit_sha[:7]

          # Keep Galaxy visible even if a browser delays or caches enhancement JS.
          orbit = '<option value="orbit">3D orbit</option>'
          galaxy = '<option value="galaxy">Galaxy showcase</option>'
          if galaxy not in html:
              html = html.replace(orbit, orbit + galaxy)

          # Expose the exact deployed revision in metadata and in the footer.
          html = re.sub(r'\s*<meta name="ipm-deploy-commit"[^>]*>', '', html)
          html = html.replace(
              '</head>',
              f'<meta name="ipm-deploy-commit" content="{commit_sha}">\n</head>',
          )

          # Remove a previously injected header/footer badge before reinserting it.
          html = re.sub(
              r'<(?:span|a) id="deployCommit"[^>]*>.*?</(?:span|a)>',
              '',
              html,
          )
          badge = (
              f'<a id="deployCommit" '
              f'href="https://github.com/BIMfabrik/ipm/commit/{commit_sha}" '
              'target="_blank" rel="noopener" '
              f'title="Deployed commit {commit_sha}" '
              'style="font:600 11px/1 ui-monospace,SFMono-Regular,Menlo,monospace;'
              'letter-spacing:.04em;color:#6ee7ff;opacity:.82;white-space:nowrap">'
              f'deployed @{short_sha}</a>'
          )
          html = html.replace(
              '</footer>',
              f'<span>{badge}</span></footer>',
              1,
          )

          old_sources = [
              './mobile-anchor-fix.js',
              './ipm-enhancements-v2.js',
              './graph-stability-v1.js',
              './galaxy-mode-v1.js',
          ]
          for source in old_sources:
              html = re.sub(
                  rf'<script src="{re.escape(source)}(?:\?[^\"]*)?"></script>\s*',
                  '',
                  html,
              )

          tags = [
              '<script src="./ipm-enhancements-v2.js?v=20260712-8"></script>',
              '<script src="./galaxy-mode-v1.js?v=20260711-3"></script>',
              '<script src="./graph-stability-v1.js?v=20260711-4"></script>',
          ]
          html = html.replace('</body>', '\n'.join(tags) + '\n</body>')
          page.write_text(html, encoding='utf-8')
          PY

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
